# push-test-image.yml — Build and push the E2E hello-world test image to GHCR.
#
# Trigger manually (workflow_dispatch) or automatically when test/hello-world/ changes.
# Uses GITHUB_TOKEN — no separate PAT required. Requires "Read and write" Actions
# permissions (Settings → Actions → General → Workflow permissions).
#
# Forkers: run this once after forking to publish the test image to your GHCR namespace.

name: Push E2E Test Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'test/hello-world/**'

jobs:
  push-test-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hello-world image
        uses: docker/build-push-action@v6
        with:
          context: test/hello-world
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ env.OWNER_LC }}/csd-hello-world:latest

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          gh api --method PATCH "/orgs/$OWNER/packages/container/csd-hello-world" -f visibility=public 2>/dev/null \
            || gh api --method PATCH "/user/packages/container/csd-hello-world" -f visibility=public 2>/dev/null \
            && echo "✓ package visibility set to public" \
            || echo "⚠ could not set visibility — set manually in GitHub package settings"
